services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-second_brain}
      POSTGRES_USER: ${POSTGRES_USER:-secondbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondbrain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-secondbrain}:${POSTGRES_PASSWORD:-secondbrain}@db:5432/${POSTGRES_DB:-second_brain}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EXTRACTION_MODEL: ${OLLAMA_EXTRACTION_MODEL:-qwen3:8b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      INBOX_FOLDER: /app/data/inbox
      GMAIL_ENABLED: ${GMAIL_ENABLED:-false}
      GMAIL_LABEL: ${GMAIL_LABEL:-SecondBrain}
      GMAIL_QUERY: ${GMAIL_QUERY:-label:SecondBrain}
      GMAIL_AUTO_PROCESS: ${GMAIL_AUTO_PROCESS:-true}
      GMAIL_CREDENTIALS_PATH: ${GMAIL_CREDENTIALS_PATH:-../data/gmail/credentials.json}
      GMAIL_TOKEN_PATH: ${GMAIL_TOKEN_PATH:-../data/gmail/token.json}
      GMAIL_OAUTH_PORT: ${GMAIL_OAUTH_PORT:-8090}
      MEDIA_ARTIFACTS_FOLDER: ${MEDIA_ARTIFACTS_FOLDER:-../data/media}
      MEDIA_TRANSCRIPTION_BACKEND: ${MEDIA_TRANSCRIPTION_BACKEND:-faster-whisper}
      MEDIA_TRANSCRIPTION_MODEL: ${MEDIA_TRANSCRIPTION_MODEL:-base}
      MEDIA_TRANSCRIPTION_DEVICE: ${MEDIA_TRANSCRIPTION_DEVICE:-cpu}
      MEDIA_TRANSCRIPTION_COMPUTE_TYPE: ${MEDIA_TRANSCRIPTION_COMPUTE_TYPE:-int8}
      MEDIA_TRANSCRIPTION_COMMAND: ${MEDIA_TRANSCRIPTION_COMMAND:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT:-8001}:8000"
      - "${GMAIL_OAUTH_PORT:-8090}:${GMAIL_OAUTH_PORT:-8090}"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://secondbrain/api}
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173

  web:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
  frontend_node_modules:
